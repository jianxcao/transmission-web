name: Docker Build and Push

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3). 留空则按当前 ref 自动判定'
        required: false
        default: ''
      tags_mode:
        description: '推送哪些 tag'
        required: false
        default: 'both'
        type: choice
        options:
          - both # 同时推送版本号和 latest
          - version # 只推送 1.2.3 / 1.2
          - latest # 只推送 latest

env:
  IMAGE_NAME: transmission-web

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 多架构构建：QEMU 装 binfmt 支持跨架构，buildx 用 docker-container driver
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 计算工作流要发布的版本号 / 是否预发布 / 是否要打 version tag / latest tag
      - name: Resolve publish context
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          MODE="${{ github.event.inputs.tags_mode || 'both' }}"
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          REF_NAME="${GITHUB_REF_NAME:-${GITHUB_REF#refs/tags/}}"

          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "❌ 缺少 DOCKERHUB_USERNAME secret"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # workflow_dispatch：优先用入参版本号；如果当前 ref 是 v* tag，则用当前 tag；最后兜底 package.json
            if [ -n "$INPUT_VERSION" ]; then
              VERSION="$INPUT_VERSION"
            elif [[ "$REF_NAME" == v* ]]; then
              VERSION="${REF_NAME#v}"
            elif [ -f package.json ]; then
              INPUT_VERSION=$(node -p "require('./package.json').version")
              VERSION="$INPUT_VERSION"
            else
              VERSION=""
            fi
          else
            # tag push：从 ref 解析版本号
            VERSION="${REF_NAME#v}"
            MODE="both"
          fi

          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "❌ 无法解析版本号"
            exit 1
          fi

          # 是否预发布（包含 "-"，例如 1.2.3-beta.1）
          IS_PRERELEASE=false
          [[ "$VERSION" == *-* ]] && IS_PRERELEASE=true

          # 决定是否打版本 tag / latest tag
          PUSH_VERSION=false
          PUSH_LATEST=false
          case "$MODE" in
            version) PUSH_VERSION=true ;;
            latest)  PUSH_LATEST=true ;;
            both|*)  PUSH_VERSION=true; PUSH_LATEST=true ;;
          esac

          # 预发布版本永远不打 latest，也不打 major.minor
          MAJOR_MINOR=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PUSH_LATEST=false
          else
            if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+(\.|$) ]]; then
              MAJOR_MINOR=$(echo "$VERSION" | awk -F. '{print $1"."$2}')
            fi
          fi

          TAGS_FILE=$(mktemp)
          if [ "$PUSH_VERSION" = "true" ]; then
            echo "$IMAGE:$VERSION" >> "$TAGS_FILE"
            if [ -n "$MAJOR_MINOR" ]; then
              echo "$IMAGE:$MAJOR_MINOR" >> "$TAGS_FILE"
            fi
          fi
          if [ "$PUSH_LATEST" = "true" ]; then
            echo "$IMAGE:latest" >> "$TAGS_FILE"
          fi

          if [ ! -s "$TAGS_FILE" ]; then
            echo "❌ 未生成任何 Docker tag，请检查 version 和 tags_mode"
            exit 1
          fi

          echo "Resolved: image=$IMAGE version=$VERSION mm=$MAJOR_MINOR mode=$MODE prerelease=$IS_PRERELEASE push_version=$PUSH_VERSION push_latest=$PUSH_LATEST"
          echo "Docker tags:"
          cat "$TAGS_FILE"

          {
            echo "image=$IMAGE"
            echo "version=$VERSION"
            echo "major_minor=$MAJOR_MINOR"
            echo "is_prerelease=$IS_PRERELEASE"
            echo "push_version=$PUSH_VERSION"
            echo "push_latest=$PUSH_LATEST"
            echo "tags<<EOF"
            cat "$TAGS_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.ctx.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ctx.outputs.version }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: always()
        run: |
          echo "### 🐳 Docker 推送结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 镜像: \`${{ steps.ctx.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.ctx.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
